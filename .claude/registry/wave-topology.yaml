# yaml-language-server: $schema=./wave-topology.schema.json
manifest:
  version: 1
  description: "Mandatory peer list and phase gate rules for session-* teams"
session_prefix: "session-*"
mandatory_peers:
  - arch-platform
  - arch-testing
  - arch-integration
  - planner
  - context-provider
  - doc-updater
  - quality-gater
phase_gates:
  plan_required_before_arch_dispatch: true
  quality_gate_required_before_push: true
