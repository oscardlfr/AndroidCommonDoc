# yaml-language-server: $schema=./agents.manifest.schema.json
#
# =============================================================================
# AndroidCommonDoc Agent Manifest
# =============================================================================
# Single source of truth for all L0 agent metadata. Validated against
# `agents.manifest.schema.json` (JSON Schema draft 2020-12).
#
# Edit policy:
#   - Phase 1 (current): hand-edited seed. Schema validation is advisory.
#   - Phase 2: validators wired into CI in WARN mode (drift detection).
#   - Phase 3: templates GENERATED from this manifest, one agent at a time.
#   - Phase 4: validators flip from WARN to BLOCK; pre-Agent-spawn hook
#              validates `name` + `subagent_type` against this manifest.
#
# Author: team-lead, 2026-04-26 (W31.7 — agents-manifest seed Phase 1)
# Status: Phase 3 ROUND 1 SHIPPED — generator at mcp-server/src/registry/template-generator.ts + CLI generate-template.ts. arch-platform / arch-testing / arch-integration regenerated; SHA-256 baselines populated. 35 agents pending future rounds. WARN-mode validators still active in drift-audit.yml. Phase 4 flips validator WARN → BLOCK + adds pre-Agent-spawn hook once all 38 templates reach canonical state.
# =============================================================================

manifest:
  version: 1
  generated_at: "2026-04-26"
  generator:
    name: "manual-seed-phase-1"
    version: "0.4.0"
    notes: "Hand-extracted from setup/agent-templates/*.md frontmatter. 38/38 populated (Phase 1 complete). team-lead retired W31.6 (PR #69) — canonical pattern is main-agent-as-team-lead per docs/agents/main-agent-orchestration-guide.md. ALL surfaced misalignments resolved 2026-04-26: 4 mechanical fixes (platform-auditor, l0-coherence-auditor, module-lifecycle, cross-platform-validator — all SendMessage / dedup); 3 investigations resolved as intentional / out-of-scope (feature-domain-specialist scaffold, runtime drift Anthropic-side, find-pattern retention W27-scope-was-architects-only). Audit #6: 6 scaffolds + 4 manual-only + 1 sporadic doc-migrator + 27 actively-dispatched. Phase 2 (2026-04-27): WARN-mode CI validator wired (scripts/sh/validate-manifest.sh + mcp-server/src/cli/validate-manifest.ts + .github/workflows/drift-audit.yml manifest-drift-warn job). Side fixes shipped alongside: NAMING_CONVENTION regex extended with -detector + -alignment suffixes; UTF-8 mojibake (â€”) in description fields of data-layer-specialist, domain-model-specialist, ui-specialist templates + mirrors restored to em-dash. Phase 3 round 1 (2026-04-27): template-generator lib + CLI shipped; arch-platform / arch-testing / arch-integration SHA-256 baselines populated via surgical line-based writer (replaces yaml Document API which would have rewritten ~900 lines). 16/38 agents already canonical-aligned at round 1 boundary; 22/38 will be canonicalized in subsequent rounds before Phase 4."

paths_template:
  template: "setup/agent-templates/{canonical_name}.md"
  mirror: ".claude/agents/{canonical_name}.md"

categories:
  - architect
  - core-specialist
  - domain-specialist
  - context
  - orchestrator
  - validator
  - auditor
  - tool
  - lead
  - doc-owner

lifecycles:
  - ephemeral
  - persistent
  - per-task

# -----------------------------------------------------------------------------
# Cross-cutting invariants (enforced by manifest validator in Phase 2+)
# -----------------------------------------------------------------------------
invariants:

  - id: ARCHITECT_NO_FILE_WRITE
    description: "Architects must not have Write/Edit tools. They plan + verify; they do not author code. Bash file-write patterns are also banned per BL-W31.7-07."
    applies_to: { category: architect }
    require:
      tools.banned.top_level: [Agent, Write, Edit]
    rationale_ref: "memory/feedback_architect_writes_code.md"

  - id: IN_PROCESS_NO_AGENT
    description: "Agents that run in-process as TeamCreate peers cannot use the Agent tool (Anthropic SDK restriction). Specialist requests must route through team-lead via SendMessage."
    applies_to: { dispatch.spawn_method: TeamCreate-peer }
    require:
      tools.banned.top_level: [Agent]
    rationale_ref: "GitHub#31977 (in-process peers lose Agent tool)"

  - id: NAMING_CONVENTION
    description: "canonical_name must be one of: arch-*, *-specialist, *-orchestrator, *-validator, *-auditor, *-agent, *-mapper, *-strategist, *-creator, *-lead, *-migrator, *-lifecycle, *-detector, *-alignment, context-provider, doc-updater, quality-gater, team-lead, advisor, debugger, researcher, verifier, planner."
    applies_to: {}
    require:
      canonical_name.pattern: "^(arch-.+|.+-specialist|.+-orchestrator|.+-validator|.+-auditor|.+-agent|.+-mapper|.+-strategist|.+-creator|.+-lead|.+-migrator|.+-lifecycle|.+-detector|.+-alignment|context-provider|doc-updater|quality-gater|team-lead|advisor|debugger|researcher|verifier|planner)$"
    rationale_ref: "W31.6 dev→specialist sweep + memory/MEMORY.md; W31.7 Phase 2 added -detector, -alignment for skill-script-alignment + doc-code-drift-detector"

  - id: CANONICAL_NAME_MATCHES_SUBAGENT_TYPE
    description: "In v1, canonical_name and subagent_type must be identical. No aliases. This prevents the test-dev/test-specialist class of bug surfaced in W31.7 session."
    applies_to: {}
    require:
      canonical_name.equals: subagent_type
    rationale_ref: "Session 2026-04-26 — test-dev/test-specialist contradiction in BL-W31.5-01 vs W31.6 sweep"

  - id: CONTEXT_PROVIDER_READ_ONLY
    description: "context-provider must not have Write/Edit tools. Read-only by design (it serves context, never mutates state)."
    applies_to: { category: context }
    require:
      tools.banned.top_level: [Write, Edit, Agent]

