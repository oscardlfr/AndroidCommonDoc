AndroidCommonDoc:
  active: true

  # ── Hand-written rules ─────────────────────────────────────────────────────
  # UiState types must be sealed interfaces or sealed classes
  SealedUiStateRule:
    active: true

  # CancellationException must always be rethrown in catch blocks
  CancellationExceptionRethrowRule:
    active: true

  # ViewModels must not depend on platform-specific types
  NoPlatformDepsInViewModelRule:
    active: true

  # SharingStarted.WhileSubscribed must specify a non-zero timeout
  WhileSubscribedTimeoutRule:
    active: true

  # Use MutableSharedFlow instead of Channel for UI events in ViewModels
  NoChannelForUiEventsRule:
    active: true

  # MutableStateFlow must not be exposed as public property — expose as StateFlow
  MutableStateFlowExposedRule:
    active: true

  # runCatching swallows CancellationException — never use in ViewModels or coroutine scopes
  NoRunCatchingInCoroutineScopeRule:
    active: true

  # Dispatchers must be injected, not hardcoded in ViewModels or UseCases
  NoHardcodedDispatchersRule:
    active: true

  # Hardcoded string literals in ViewModels — use UiText/StringResource instead
  NoHardcodedStringsInViewModelRule:
    active: true

  # Hardcoded magic numbers in business logic — extract as named constants
  NoMagicNumbersInUseCaseRule:
    active: true

  # launch {} in init {} is dangerous — coroutines may outlive the owner lifecycle
  NoLaunchInInitRule:
    active: true

  # catch(e: Exception) without rethrowing CancellationException silently swallows cancellation
  NoSilentCatchRule:
    active: true

  # Navigation must be state-driven — Channel must not be used for navigation events
  NoChannelForNavigationRule:
    active: true
