name: Agentskills Spec Pilot

on:
  push:
    branches: [master, develop]
    paths:
      - 'skills/**'
  pull_request:
    branches: [master, develop]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  agentskills-validate:
    name: Agentskills Spec Pilot (WARN)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Validate skills against agentskills.io spec
        continue-on-error: true
        run: |
          set +e
          PASS=0
          FAIL=0
          ERRORS=""
          TABLE="| Skill | Verdict | Notes |\n|-------|---------|-------|\n"

          for skill_dir in skills/*/; do
            skill_name="$(basename "$skill_dir")"
            output="$(uvx --from "git+https://github.com/agentskills/agentskills#subdirectory=skills-ref" skills-ref validate "$skill_dir" 2>&1)"
            exit_code=$?
            if [ "$exit_code" -eq 0 ]; then
              PASS=$((PASS + 1))
              TABLE="${TABLE}| ${skill_name} | PASS | |\n"
            else
              FAIL=$((FAIL + 1))
              notes="$(echo "$output" | head -1 | tr '|' '/')"
              TABLE="${TABLE}| ${skill_name} | FAIL | ${notes} |\n"
              ERRORS="${ERRORS}${skill_name}: ${output}\n"
            fi
          done

          TOTAL=$((PASS + FAIL))
          {
            echo "## Agentskills Spec Pilot Results (WARN-only)"
            echo ""
            echo "**${PASS}/${TOTAL} skills pass** agentskills.io spec validation."
            echo ""
            printf "%b" "$TABLE"
            if [ "$FAIL" -gt 0 ]; then
              echo ""
              echo "> **Note**: Failures are advisory only (Fase A). See \`docs/skills/agentskills-pilot.md\` for context."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit 0
