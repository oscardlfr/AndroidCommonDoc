name: Shell Script Tests

on:
  workflow_call:

jobs:
  bats:
    name: bats shell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install bats
        run: |
          npm install bats
          npx bats --version

      - name: Install kmp-test-runner
        run: npm install -g kmp-test-runner@0.9.0

      - name: Run shell tests
        run: npx bats scripts/tests/*.bats

      - name: Run Node.js hook tests
        run: |
          set -e
          # SKIP_PATTERNS: keep empty unless a test ships drifted and needs a temporary skip.
          # BL-W37 PR4 (BL-W34-E) re-enabled context-provider-consulted/gate tests after
          # observability fix landed; both pass clean.
          SKIP_PATTERNS=()
          for f in scripts/tests/*.test.js; do
            skip=0
            for pat in "${SKIP_PATTERNS[@]}"; do
              if [[ "$f" == *"$pat"* ]]; then skip=1; break; fi
            done
            if [[ $skip -eq 1 ]]; then echo "SKIP $f"; continue; fi
            echo "Running $f..."
            node "$f"
          done

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: bats-results
          path: scripts/tests/
          retention-days: 7
