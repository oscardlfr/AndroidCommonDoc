name: Shell Script Tests

on:
  workflow_call:

jobs:
  bats:
    name: bats shell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install bats
        run: |
          npm install bats
          npx bats --version

      - name: Install kmp-test-runner
        run: npm install -g kmp-test-runner@0.7.0

      - name: Run shell tests
        run: npx bats scripts/tests/*.bats

      - name: Run Node.js hook tests
        run: |
          set -e
          # BL-W34: 2 pre-existing test files have spec-drift bugs and never ran in CI before.
          # Re-enable each once its design decision is resolved (per-agent vs session flag scope, etc.).
          # See BL-W34 backlog entries for details.
          SKIP_PATTERNS=(
            "context-provider-consulted"  # BL-W34: hook writes session flag, test expects per-agent
            "context-provider-gate"        # BL-W34: F1 test fails on clean env (pre-existing)
          )
          for f in scripts/tests/*.test.js; do
            skip=0
            for pat in "${SKIP_PATTERNS[@]}"; do
              if [[ "$f" == *"$pat"* ]]; then skip=1; break; fi
            done
            if [[ $skip -eq 1 ]]; then echo "SKIP $f (BL-W34)"; continue; fi
            echo "Running $f..."
            node "$f"
          done

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: bats-results
          path: scripts/tests/
          retention-days: 7
