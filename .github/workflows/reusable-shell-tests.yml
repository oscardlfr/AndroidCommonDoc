name: Shell Script Tests

on:
  workflow_call:

jobs:
  bats:
    name: bats shell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install bats
        run: |
          npm install bats
          npx bats --version

      - name: Install kmp-test-runner
        run: npm install -g kmp-test-runner@0.7.0

      - name: Run shell tests
        run: npx bats scripts/tests/*.bats

      - name: Run Node.js hook tests
        run: |
          set -e
          for f in scripts/tests/*.test.js; do
            # BL-W34: context-provider-consulted.test.js asserts per-agent flag scope,
            # but hook writes session-scoped flag — pre-existing spec drift, design
            # decision needed before re-enabling. Tracked in BL-W34.
            [[ "$f" == *context-provider-consulted* ]] && { echo "SKIP $f (BL-W34)"; continue; }
            echo "Running $f..."
            node "$f"
          done

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: bats-results
          path: scripts/tests/
          retention-days: 7
