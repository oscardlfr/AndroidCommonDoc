name: UI Validation

# Runtime UI validation pipeline for two production UI targets:
#
# 1. Android (live device via emulator): `android-layout-diff`
#    Captures on-device layout, diffs against `baselines/android/**/*.json`.
# 2. Compose Multiplatform desktop (JVM): `compose-semantic-diff`
#    Runs `./gradlew verifyUiBaselines` (which asserts in-test against
#    `baselines/desktop/**/*.txt`) and then invokes the MCP CLI for each
#    screen to produce structured findings as build artifacts.
#
# Both jobs fail the PR on any HIGH finding — the signature of the
# "tests pass but app is broken" bug class.
#
# Scoped to PRs that touch UI code or baselines. No-op for non-UI changes
# so the emulator cost is bounded.
#
# Note: both jobs are intentionally gated behind `enabled: false` on L0
# itself (L0 has no app / no desktop target). Shipped for consumer
# projects to adopt via `/sync-l0` and then enable by flipping `enabled: true`.

on:
  pull_request:
    paths:
      - '**/ui/**'
      - '**/compose/**'
      - '**/*Screen.kt'
      - '**/*Compose*.kt'
      - 'baselines/**/*.json'
      - 'baselines/**/*.txt'
  workflow_dispatch:
    inputs:
      enabled:
        description: "Set to true to actually run (L0 default is false — no app / no desktop target to deploy)"
        required: false
        default: "false"

concurrency:
  group: ui-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate — is this enabled?
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Decide whether to run
        id: decide
        run: |
          # L0 itself has neither app nor desktop target. Consumers flip this to 'true' in their fork.
          echo "run=false" >> "$GITHUB_OUTPUT"

  android-layout-diff:
    name: Android Layout Diff
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_CLI_VERSION: "0.7"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build MCP server CLI
        run: |
          cd mcp-server
          npm ci
          npm run build

      - name: Install Android CLI v0.7
        run: |
          mkdir -p "$HOME/android-cli"
          curl -fsSL "https://edgedl.me.gvt1.com/edgedl/android/cli/latest/linux_x86_64/android" \
            -o "$HOME/android-cli/android"
          chmod +x "$HOME/android-cli/android"
          echo "$HOME/android-cli" >> "$GITHUB_PATH"

      - name: Verify CLI
        run: |
          android --version

      - name: Set up Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          script: |
            # Build the debug APK that the emulator will run against.
            ./gradlew :app:assembleDebug

            # Install the APK.
            adb install app/build/outputs/apk/debug/app-debug.apk

            # Get the device serial (single emulator in CI).
            DEVICE_SERIAL="$(adb devices | awk 'NR==2 {print $1}')"
            echo "device: $DEVICE_SERIAL"

            # Navigate each baseline screen, capture layout, diff against
            # the committed baseline.
            mkdir -p out/layout-diff
            FAIL=0
            for baseline in baselines/android/*.json; do
              [ -e "$baseline" ] || continue
              SCREEN="$(basename "$baseline" .json)"
              echo "=== Validating $SCREEN ==="

              # Bring the app to the target screen. Consumer projects must
              # provide scripts/ui-validation/<screen>.sh that knows how
              # to navigate to each baseline screen.
              if [ -x "scripts/ui-validation/$SCREEN.sh" ]; then
                bash "scripts/ui-validation/$SCREEN.sh"
              else
                echo "WARN: no navigation script for $SCREEN — skipping"
                continue
              fi
              sleep 2

              # Retrofit CLI from Phase 21-01. Writes JSON report to stdout; exit 1 on HIGH.
              node mcp-server/build/cli/android-layout-diff.js \
                --device-serial "$DEVICE_SERIAL" \
                --baseline "$baseline" \
                --format json > "out/layout-diff/$SCREEN.json" || FAIL=1
            done

            exit $FAIL

      - name: Upload android diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-layout-diff-${{ github.run_id }}
          path: out/layout-diff/
          retention-days: 14

      - name: Parse HIGH findings (android)
        if: always()
        run: |
          node - <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');
          const dir = 'out/layout-diff';
          if (!fs.existsSync(dir)) { process.exit(0); }
          let high = 0;
          for (const f of fs.readdirSync(dir)) {
            const blob = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf-8'));
            const findings = blob.findings ?? [];
            for (const x of findings) if (x.severity === 'HIGH') high++;
          }
          console.log(`HIGH findings across all android screens: ${high}`);
          process.exit(high > 0 ? 1 : 0);
          EOF

  desktop-semantic-diff:
    name: Compose Semantic Diff (desktop JVM)
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build MCP server CLI
        run: |
          cd mcp-server
          npm ci
          npm run build

      - name: Run verifyUiBaselines
        # Primary gate — fails the build if any desktop baseline drifts.
        # The capture helper writes per-screen current .txt to build/ui-snapshots/.
        run: ./gradlew verifyUiBaselines

      - name: Produce structured findings for each baseline
        # Even when verifyUiBaselines passes, emit findings JSON for
        # agent post-hoc analysis. When it fails, the current .txt files
        # have already been written, so findings here will show exactly
        # what drifted.
        if: always()
        run: |
          mkdir -p out/semantic-diff
          FAIL=0
          for baseline in baselines/desktop/*.txt; do
            [ -e "$baseline" ] || continue
            SCREEN="$(basename "$baseline" .txt)"
            CURRENT="build/ui-snapshots/${SCREEN}.current.txt"
            if [ ! -f "$CURRENT" ]; then
              echo "WARN: no current capture for $SCREEN at $CURRENT — skipping structured findings"
              continue
            fi
            echo "=== Structured findings for $SCREEN ==="
            node mcp-server/build/cli/compose-semantic-diff.js \
              --baseline "$baseline" \
              --current "$CURRENT" \
              --screen-name "$SCREEN" \
              --format json > "out/semantic-diff/$SCREEN.json" || FAIL=1
          done
          # Note: we do NOT exit on FAIL here — verifyUiBaselines is the
          # authoritative gate. This step is diagnostic. If we reached
          # this step and verifyUiBaselines had failed, the job already
          # failed at the previous step.
          echo "Structured findings written to out/semantic-diff/ (non-zero CLI exit codes recorded but not propagated: $FAIL)"

      - name: Upload desktop diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-semantic-diff-${{ github.run_id }}
          path: out/semantic-diff/
          retention-days: 14
