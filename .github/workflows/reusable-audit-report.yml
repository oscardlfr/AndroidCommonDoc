name: Reusable вЂ” Audit Report

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# AndroidCommonDoc L0 reusable workflow вЂ” Quality Audit Report
#
# Reads .androidcommondoc/audit-log.jsonl (written by instrumented scripts)
# and generates a manager-friendly HTML + markdown quality report.
#
# Designed to run on merge to develop/main. The HTML artifact is available
# in the GitHub Actions run for download вЂ” no external hosting required.
#
# Usage from consumer project:
#
#   jobs:
#     audit:
#       uses: <org>/AndroidCommonDoc/.github/workflows/reusable-audit-report.yml@main
#       with:
#         weeks_lookback: 6
#         generate_html: true
#         post_pr_comment: false
#         fail_on_regression: false
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

on:
  workflow_call:
    inputs:
      weeks_lookback:
        description: "Number of ISO weeks to include in the trend report"
        type: number
        default: 6
      generate_html:
        description: "Generate downloadable HTML artifact"
        type: boolean
        default: true
      post_pr_comment:
        description: "Post report as a PR comment (requires pull_request trigger in caller)"
        type: boolean
        default: false
      fail_on_regression:
        description: "Fail the workflow if health is CRITICAL (CVE critical > 0, pass rate < 80%, coverage < 40%)"
        type: boolean
        default: false
      project_root:
        description: "Subdirectory containing .androidcommondoc/ (default: repo root)"
        type: string
        default: "."

jobs:
  audit-report:
    name: "рџ“Љ Quality Audit Report"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"

      - name: Install MCP server dependencies
        run: |
          cd mcp-server
          npm ci --prefer-offline 2>/dev/null || npm install

      - name: Build MCP server
        run: |
          cd mcp-server
          npm run build

      - name: Generate audit report
        id: audit
        run: |
          PROJECT_ROOT="${{ inputs.project_root }}"
          WEEKS="${{ inputs.weeks_lookback }}"
          LOG_FILE="$PROJECT_ROOT/.androidcommondoc/audit-log.jsonl"

          if [[ ! -f "$LOG_FILE" ]]; then
            echo "status=no_data" >> "$GITHUB_OUTPUT"
            echo "## вљЄ Quality Audit" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No audit log found at \`$LOG_FILE\`." >> "$GITHUB_STEP_SUMMARY"
            echo "Scripts will create it automatically on the next test/scan run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Audit log found. Generating report for $WEEKS weeks..."

          # Generate report via Node.js script (avoids full MCP server startup)
          node - <<'EOF' > /tmp/audit-report.json
          import { readFileSync, createReadStream } from 'node:fs';
          import { createInterface } from 'node:readline';
          import path from 'node:path';

          const logPath = process.env.LOG_FILE;
          const weeksBack = parseInt(process.env.WEEKS || '6');
          const entries = [];

          const rl = createInterface({ input: createReadStream(logPath), crlfDelay: Infinity });
          rl.on('line', line => { try { entries.push(JSON.parse(line)); } catch {} });
          rl.on('close', () => {
            const cutoff = new Date(Date.now() - weeksBack * 7 * 24 * 3600 * 1000);
            const recent = entries.filter(e => new Date(e.ts) >= cutoff);
            const lastCov = [...entries].reverse().find(e => e.event === 'coverage');
            const lastSbom = [...entries].reverse().find(e => e.event === 'sbom_scan');
            const lastTest = [...entries].reverse().find(e => e.event === 'android_test');
            const latest = {
              coverage_pct: lastCov?.coverage_pct,
              detekt_violations: lastCov?.detekt_violations,
              tests_pass_rate: lastTest?.pass_rate,
              cve_critical: lastSbom?.cve_critical,
              cve_high: lastSbom?.cve_high,
              ts: entries[entries.length - 1]?.ts ?? '',
              branch: entries[entries.length - 1]?.branch ?? '',
              commit: entries[entries.length - 1]?.commit ?? '',
              project: entries[0]?.project ?? path.basename(process.env.PROJECT_ROOT),
            };
            const health = (
              (latest.cve_critical > 0) ||
              (latest.tests_pass_rate !== undefined && latest.tests_pass_rate < 80) ||
              (latest.coverage_pct !== undefined && latest.coverage_pct < 40)
            ) ? 'CRITICAL' : (
              (latest.coverage_pct < 60) || (latest.tests_pass_rate < 90) || ((latest.cve_high ?? 0) > 5)
            ) ? 'WARNING' : 'HEALTHY';
            console.log(JSON.stringify({ latest, health, total: entries.length, recent: recent.length }));
          });
          EOF
          LOG_FILE="$LOG_FILE" WEEKS="$WEEKS" PROJECT_ROOT="$PROJECT_ROOT" node --input-type=module < /tmp/audit-report.json 2>/dev/null > /tmp/audit-data.json || echo '{}' > /tmp/audit-data.json

          HEALTH=$(python3 -c "import json; d=json.load(open('/tmp/audit-data.json')); print(d.get('health','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          COVERAGE=$(python3 -c "import json; d=json.load(open('/tmp/audit-data.json')); print(d.get('latest',{}).get('coverage_pct','вЂ”'))" 2>/dev/null || echo "вЂ”")
          DETEKT=$(python3 -c "import json; d=json.load(open('/tmp/audit-data.json')); print(d.get('latest',{}).get('detekt_violations','вЂ”'))" 2>/dev/null || echo "вЂ”")
          CVE_C=$(python3 -c "import json; d=json.load(open('/tmp/audit-data.json')); print(d.get('latest',{}).get('cve_critical','вЂ”'))" 2>/dev/null || echo "вЂ”")

          echo "status=$HEALTH" >> "$GITHUB_OUTPUT"
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "detekt=$DETEKT" >> "$GITHUB_OUTPUT"
          echo "cve_critical=$CVE_C" >> "$GITHUB_OUTPUT"

          # Write GitHub Step Summary
          {
            EMOJI="рџџў"
            [[ "$HEALTH" == "WARNING" ]] && EMOJI="рџџЎ"
            [[ "$HEALTH" == "CRITICAL" ]] && EMOJI="рџ”ґ"
            echo "## ${EMOJI} Quality Audit вЂ” ${HEALTH}"
            echo ""
            echo "| MГ©trica | Valor |"
            echo "|---------|-------|"
            echo "| Cobertura | ${COVERAGE}% |"
            echo "| Detekt violations | ${DETEKT} |"
            echo "| CVEs crГ­ticos | ${CVE_C} |"
            echo ""
            echo "Log: \`$LOG_FILE\` | PerГ­odo: ${WEEKS} semanas"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate HTML report
        if: inputs.generate_html && steps.audit.outputs.status != 'no_data'
        run: |
          LOG="${{ inputs.project_root }}/.androidcommondoc/audit-log.jsonl"
          python3 - <<PYEOF > /tmp/audit-report.html
          import json, sys, datetime

          try:
              entries = [json.loads(l) for l in open("$LOG") if l.strip()]
          except:
              entries = []

          project = entries[0].get('project','Project') if entries else 'Project'
          layer   = entries[0].get('layer','') if entries else ''
          generated = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')

          # Group by week
          from collections import defaultdict
          def iso_week(ts):
              try:
                  d = datetime.datetime.fromisoformat(ts.replace('Z','+00:00'))
                  return d.strftime('%Y-W%V')
              except:
                  return 'unknown'

          weeks = defaultdict(lambda: {})
          for e in entries:
              w = iso_week(e['ts'])
              ev = e['event']
              if ev == 'coverage':
                  weeks[w]['coverage_pct'] = e.get('coverage_pct')
                  weeks[w]['detekt'] = e.get('detekt_violations')
              elif ev == 'sbom_scan':
                  weeks[w]['cve_c'] = e.get('cve_critical', 0)
                  weeks[w]['cve_h'] = e.get('cve_high', 0)
              elif ev == 'android_test':
                  weeks[w]['pass_rate'] = e.get('pass_rate')

          def tl(metric, val):
              if val is None: return '#9e9e9e'
              if metric == 'coverage': return '#4caf50' if val >= 80 else '#ff9800' if val >= 60 else '#f44336'
              if metric == 'detekt':   return '#4caf50' if val == 0 else '#ff9800' if val <= 10 else '#f44336'
              if metric == 'tests':    return '#4caf50' if val >= 99 else '#ff9800' if val >= 90 else '#f44336'
              if metric == 'cve':      return '#4caf50' if val == 0 else '#ff9800' if val <= 2 else '#f44336'
              return '#9e9e9e'

          sorted_weeks = sorted(weeks.items())
          rows = ''
          for w, d in sorted_weeks:
              cov  = f"{d.get('coverage_pct','вЂ”')}%" if d.get('coverage_pct') is not None else 'вЂ”'
              det  = str(d.get('detekt','вЂ”'))
              tst  = f"{d.get('pass_rate','вЂ”')}%" if d.get('pass_rate') is not None else 'вЂ”'
              cvec = str(d.get('cve_c','вЂ”'))
              cveh = str(d.get('cve_h','вЂ”'))
              rows += f'<tr><td>{w}</td><td style="color:{tl("coverage",d.get("coverage_pct"))}">{cov}</td><td style="color:{tl("detekt",d.get("detekt"))}">{det}</td><td style="color:{tl("tests",d.get("pass_rate"))}">{tst}</td><td style="color:{tl("cve",d.get("cve_c"))}">{cvec}</td><td>{cveh}</td></tr>'

          last = entries[-1] if entries else {}
          last_cov_entry = next((e for e in reversed(entries) if e['event']=='coverage'), {})
          last_sbom_entry = next((e for e in reversed(entries) if e['event']=='sbom_scan'), {})
          last_test_entry = next((e for e in reversed(entries) if e['event']=='android_test'), {})

          health_color = '#4caf50'
          if last_sbom_entry.get('cve_critical',0)>0 or last_test_entry.get('pass_rate',100)<80 or last_cov_entry.get('coverage_pct',100)<40:
              health_color = '#f44336'
          elif last_cov_entry.get('coverage_pct',100)<60 or last_test_entry.get('pass_rate',100)<90:
              health_color = '#ff9800'

          print(f"""<!DOCTYPE html>
          <html lang="es"><head><meta charset="UTF-8">
          <title>Quality Report вЂ” {project}</title>
          <style>
            body{{font-family:system-ui,sans-serif;background:#121212;color:#e0e0e0;margin:0;padding:2rem}}
            h1{{color:#fff;font-size:1.5rem;margin-bottom:.25rem}}
            .meta{{color:#9e9e9e;font-size:.875rem;margin-bottom:2rem}}
            .health{{display:inline-block;padding:.25rem .75rem;border-radius:99px;font-weight:700;font-size:.875rem;background:{health_color};color:#fff;margin-bottom:2rem}}
            table{{width:100%;border-collapse:collapse;margin-bottom:2rem;font-size:.9rem}}
            th{{background:#1e1e1e;color:#bbb;text-align:left;padding:.5rem .75rem;font-weight:500}}
            td{{padding:.5rem .75rem;border-bottom:1px solid #2a2a2a}}
            tr:hover td{{background:#1a1a1a}}
            .kpi{{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:2rem}}
            .kpi-card{{background:#1e1e1e;border-radius:.5rem;padding:1rem 1.5rem;min-width:120px}}
            .kpi-label{{color:#9e9e9e;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em}}
            .kpi-value{{font-size:1.75rem;font-weight:700;margin-top:.25rem}}
          </style></head><body>
          <h1>рџ“Љ Quality Report вЂ” {project}{' (' + layer + ')' if layer else ''}</h1>
          <div class="meta">Generated: {generated} В· {len(entries)} events recorded</div>
          <span class="health">в—Џ {'HEALTHY' if health_color=='#4caf50' else 'WARNING' if health_color=='#ff9800' else 'CRITICAL'}</span>
          <div class="kpi">
            <div class="kpi-card"><div class="kpi-label">Cobertura</div><div class="kpi-value" style="color:{tl('coverage',last_cov_entry.get('coverage_pct'))}">{last_cov_entry.get('coverage_pct','вЂ”')}{'%' if last_cov_entry.get('coverage_pct') is not None else ''}</div></div>
            <div class="kpi-card"><div class="kpi-label">Detekt</div><div class="kpi-value" style="color:{tl('detekt',last_cov_entry.get('detekt_violations'))}">{last_cov_entry.get('detekt_violations','вЂ”')}</div></div>
            <div class="kpi-card"><div class="kpi-label">Tests pass rate</div><div class="kpi-value" style="color:{tl('tests',last_test_entry.get('pass_rate'))}">{last_test_entry.get('pass_rate','вЂ”')}{'%' if last_test_entry.get('pass_rate') is not None else ''}</div></div>
            <div class="kpi-card"><div class="kpi-label">CVE crГ­ticos</div><div class="kpi-value" style="color:{tl('cve',last_sbom_entry.get('cve_critical'))}">{last_sbom_entry.get('cve_critical','вЂ”')}</div></div>
            <div class="kpi-card"><div class="kpi-label">CVE altos</div><div class="kpi-value">{last_sbom_entry.get('cve_high','вЂ”')}</div></div>
          </div>
          <h2 style="font-size:1rem;color:#bbb;margin-bottom:.75rem">Historial por semana</h2>
          <table><thead><tr><th>Semana</th><th>Cobertura</th><th>Detekt violations</th><th>Tests (pass rate)</th><th>CVE crГ­ticos</th><th>CVE altos</th></tr></thead>
          <tbody>{rows}</tbody></table>
          <div style="color:#666;font-size:.75rem">Generado por AndroidCommonDoc audit-report В· {generated}</div>
          </body></html>""")
          PYEOF

      - name: Upload HTML artifact
        if: inputs.generate_html && steps.audit.outputs.status != 'no_data'
        uses: actions/upload-artifact@v5
        with:
          name: quality-audit-report
          path: /tmp/audit-report.html
          retention-days: 90

      - name: Post PR comment
        if: inputs.post_pr_comment && github.event_name == 'pull_request' && steps.audit.outputs.status != 'no_data'
        uses: actions/github-script@v7
        with:
          script: |
            const health = '${{ steps.audit.outputs.status }}';
            const emoji = health === 'HEALTHY' ? 'рџџў' : health === 'WARNING' ? 'рџџЎ' : 'рџ”ґ';
            const coverage = '${{ steps.audit.outputs.coverage }}';
            const detekt = '${{ steps.audit.outputs.detekt }}';
            const cve = '${{ steps.audit.outputs.cve_critical }}';
            const body = [
              `## ${emoji} Quality Audit вЂ” ${health}`,
              '',
              '| MГ©trica | Valor |',
              '|---------|-------|',
              `| Cobertura | ${coverage}% |`,
              `| Detekt violations | ${detekt} |`,
              `| CVEs crГ­ticos | ${cve} |`,
              '',
              '_Full HTML report available as Actions artifact._',
            ].join('\n');
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail on regression
        if: inputs.fail_on_regression && steps.audit.outputs.status == 'CRITICAL'
        run: |
          echo "вќЊ Health is CRITICAL. Set fail_on_regression: false to allow this to pass."
          exit 1
