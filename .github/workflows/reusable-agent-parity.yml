name: Agent Parity Check

# ──────────────────────────────────────────────────────────────────────────────
# AndroidCommonDoc L0 reusable workflow — .claude/agents ↔ GSD parity
#
# Verifies that .claude/agents/ and GSD agents directories are in sync.
# Clones AndroidCommonDoc for the scripts if not available locally.
#
# Usage from consumer project:
#
#   jobs:
#     agent-parity:
#       uses: <org>/AndroidCommonDoc/.github/workflows/reusable-agent-parity.yml@master
#       with:
#         target: project
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      target:
        description: 'GSD agent target: user or project'
        required: false
        default: 'project'
        type: string
      androidcommondoc_path:
        description: 'Path to AndroidCommonDoc toolkit root (for scripts). Empty = auto-clone.'
        required: false
        default: ''
        type: string

jobs:
  agent-parity:
    name: Check .claude/agents ↔ GSD parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkout AndroidCommonDoc (for scripts)
        if: inputs.androidcommondoc_path == ''
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/AndroidCommonDoc
          path: .androidcommondoc-toolkit
          sparse-checkout: |
            scripts/sh/sync-gsd-agents.sh
            scripts/sh/check-agent-parity.sh

      - name: Resolve script paths
        id: scripts
        run: |
          if [ -n "${{ inputs.androidcommondoc_path }}" ]; then
            ROOT="${{ inputs.androidcommondoc_path }}"
          else
            ROOT=".androidcommondoc-toolkit"
          fi
          echo "sync=${ROOT}/scripts/sh/sync-gsd-agents.sh" >> "$GITHUB_OUTPUT"
          echo "check=${ROOT}/scripts/sh/check-agent-parity.sh" >> "$GITHUB_OUTPUT"

      - name: Setup GSD agents directory
        run: |
          if [ "${{ inputs.target }}" = "user" ]; then
            mkdir -p ~/.gsd/agent/agents
          else
            mkdir -p .gsd/agents
          fi

      - name: Sync GSD agents
        run: |
          bash "${{ steps.scripts.outputs.sync }}" \
            --target "${{ inputs.target }}" \
            --project-root "$(pwd)" \
            --verbose

      - name: Check agent parity
        run: |
          bash "${{ steps.scripts.outputs.check }}" \
            --target "${{ inputs.target }}" \
            --project-root "$(pwd)"
